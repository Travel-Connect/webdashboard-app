<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>宿泊BI ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app/tokens.css" />
<style>
  :root { --font: "Inter", "Noto Sans JP", system-ui, sans-serif; }
  #root { min-height: 100vh; }
  .skel { background: linear-gradient(90deg, var(--surface-3) 25%, #e9edf2 37%, var(--surface-3) 63%); background-size: 400% 100%; animation: sh 1.4s ease infinite; }
  @keyframes sh { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
  table.tbl tbody tr:last-child td { border-bottom: none; }
  .fade-in { animation: fi .25s ease both; }
  @keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @media print { .no-print { display: none !important; } }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#172033"/>
    <rect x="30" y="30" width="40" height="40" rx="8" fill="#2563EB"/>
    <rect x="38" y="40" width="24" height="5" rx="2" fill="#fff"/>
    <rect x="38" y="50" width="16" height="5" rx="2" fill="#86efac"/>
    <rect x="38" y="58" width="20" height="4" rx="2" fill="#cdd9f5"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<!-- lucide icons (UMD) -->
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- app modules (order matters) -->
<script type="text/babel" src="app/lib.jsx"></script>
<script type="text/babel" src="app/charts.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/appshell.jsx"></script>
<script type="text/babel" src="app/screens-dashboard.jsx"></script>
<script type="text/babel" src="app/screens-occupancy.jsx"></script>
<script type="text/babel" src="app/screens-stub.jsx"></script>
<script type="text/babel" src="app/screens-stay.jsx"></script>
<script type="text/babel" src="app/screens-roomtypes.jsx"></script>
<script type="text/babel" src="app/annual-data.jsx"></script>
<script type="text/babel" src="app/screens-annual.jsx"></script>
<script type="text/babel" src="app/screens-booking.jsx"></script>
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
